<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Profissional</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
}

header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}

.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}

.card:hover { transform: translateY(-2px); }

.hidden { display: none; }

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  nav { flex-direction: column; }
  .container { padding: 10px; }
}

/* 🎯 CENTRALIZAR BOTÃO */
.link-final {
  text-align: center;
  margin: 20px;
}
</style>
</head>

<body>

<header>🎒 Mochila Escolar Profissional</header>

<nav>
  <button onclick="abrir('materias')">Matérias</button>
  <button onclick="abrir('horario')">Horário</button>
</nav>

<div class="container">

<div id="materias">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <button onclick="addMateria()">Adicionar</button>
  </div>
  <div id="listaMaterias"></div>
</div>

<div id="horario" class="hidden">
  <div class="card">
    <h3>Matutino (5 aulas)</h3>
    <table id="matutino"></table>

    <h3>Vespertino (4 aulas)</h3>
    <table id="vespertino"></table>

    <button onclick="salvarHorario()">Salvar Horário</button>
  </div>
</div>

</div>

<div class="link-final">
  <a href="resumoSO.html">
    <button>💻 Sistemas Operacionais</button>
  </a>
</div>

<script>
let materias = [];

// ---------------- SALVAR / CARREGAR
function salvarDados(){
  localStorage.setItem('materias', JSON.stringify(materias));
}

function carregarDados(){
  const dados = localStorage.getItem('materias');
  if(dados){
    materias = JSON.parse(dados);
  }
}

// ---------------- ABAS
function abrir(aba){
  ['materias','horario'].forEach(a=>document.getElementById(a).classList.add('hidden'));
  document.getElementById(aba).classList.remove('hidden');

  if(aba==='horario'){
    gerarTabela('matutino',5);
    gerarTabela('vespertino',4);
    carregarHorario();
  }
}

// ---------------- MATÉRIAS
function addMateria(){
  const nome = document.getElementById('nomeMateria').value.trim();
  if(!nome) return alert('Digite o nome da matéria');

  materias.push(nome);
  document.getElementById('nomeMateria').value='';

  salvarDados();
  renderMaterias();
}

function delMateria(i){
  if(confirm("Tem certeza que deseja excluir?")){
    materias.splice(i,1);
    salvarDados();
    renderMaterias();
  }
}

function renderMaterias(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML='';

  if(materias.length === 0){
    lista.innerHTML = "<p>Nenhuma matéria ainda 😢</p>";
    return;
  }

  materias.forEach((m,i)=>{
    lista.innerHTML += `
      <div class="card">
        ${m}
        <button onclick="delMateria(${i})">Excluir</button>
      </div>
    `;
  });
}

// ---------------- HORÁRIO
function gerarTabela(id,linhas){
  const dias=['Seg','Ter','Qua','Qui','Sex'];
  let html='<tr><th>Aula</th>';

  dias.forEach(d=>html+=`<th>${d}</th>`);
  html+='</tr>';

  for(let i=1;i<=linhas;i++){
    html+=`<tr><td>${i}</td>`;
    dias.forEach(d=>{
      html+=`<td contenteditable id="${id}-${i}-${d}"></td>`;
    });
    html+='</tr>';
  }

  document.getElementById(id).innerHTML=html;
}

function salvarHorario(){
  const dados = {};

  document.querySelectorAll('[contenteditable]').forEach(el=>{
    dados[el.id] = el.innerText;
  });

  localStorage.setItem('horario', JSON.stringify(dados));
  alert("Horário salvo!");
}

function carregarHorario(){
  const h = localStorage.getItem('horario');
  if(!h) return;

  const dados = JSON.parse(h);

  setTimeout(()=>{
    for(let id in dados){
      const el = document.getElementById(id);
      if(el) el.innerText = dados[id];
    }
  },100);
}

// INIT
carregarDados();
abrir('materias');
renderMaterias();
</script>

</body>
</html>
