<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
  transition: 0.3s;
}

/* DARK MODE */
.dark {
  background: #1b4332;
  color: #d8f3dc;
}
.dark .card { background: #2d6a4f; }
.dark header { background: #081c15; }
.dark nav { background: #1b4332; }

header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  position: relative;
}

.dark-btn {
  position: absolute;
  right: 10px;
  top: 10px;
}

nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  background: #d8f3dc;
  padding: 10px;
}

.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.hidden { display: none; }

/* inputs corrigidos */
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #95d5b2;
  cursor: pointer;
  margin-top: 5px;
}

button.excluir {
  background: #f28b82;
}

/* tabela */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
}

td input {
  width: 100%;
  border: none;
  outline: none;
}
</style>
</head>

<body>

<header>
  Mochila Escolar
  <button class="dark-btn" onclick="toggleDark()">🌙</button>
</header>

<nav>
  <button onclick="abrir('materias')">Matérias</button>
  <button onclick="abrir('horario')">Horário</button>
  <button onclick="abrir('provas')">Provas</button>
</nav>

<div class="container">

<!-- MATÉRIAS -->
<div id="materias">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <button onclick="addMateria()">Adicionar</button>
  </div>
  <div id="listaMaterias"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="hidden">
  <div class="card">
    <h3>Matutino</h3>
    <table id="matutino"></table>

    <h3>Vespertino</h3>
    <table id="vespertino"></table>

    <button onclick="salvarHorario()">Salvar Horário</button>
  </div>
</div>

<!-- PROVAS -->
<div id="provas" class="hidden">
  <div class="card">
    <input id="materiaProva" placeholder="Matéria">
    <input id="dataProva" type="date">
    <button onclick="addProva()">Adicionar Prova</button>
  </div>
  <div id="listaProvas"></div>
</div>

</div>

<script>
let materias = [];
let provas = [];

/* LOCAL STORAGE */
function salvarDados(){
  localStorage.setItem("materias", JSON.stringify(materias));
  localStorage.setItem("provas", JSON.stringify(provas));
}

function carregarDados(){
  materias = JSON.parse(localStorage.getItem("materias")) || [];
  provas = JSON.parse(localStorage.getItem("provas")) || [];
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* NAVEGAÇÃO */
function abrir(aba){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(aba).classList.remove("hidden");

  if(aba==="horario"){
    gerarTabela("matutino",5);
    gerarTabela("vespertino",4);
  }

  renderMaterias();
  renderProvas();
}

/* MATÉRIAS */
function addMateria(){
  const nome = document.getElementById("nomeMateria").value;
  if(!nome) return;

  materias.push(nome);
  document.getElementById("nomeMateria").value="";
  salvarDados();
  renderMaterias();
}

function renderMaterias(){
  const lista = document.getElementById("listaMaterias");
  lista.innerHTML="";

  materias.forEach((m,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${m}
      <button class="excluir" onclick="removerMateria(${i})">Excluir</button>
    `;
    lista.appendChild(div);
  });
}

function removerMateria(i){
  materias.splice(i,1);
  salvarDados();
  renderMaterias();
}

/* HORÁRIO */
function gerarTabela(id, aulas){
  const tabela = document.getElementById(id);
  tabela.innerHTML="";

  for(let i=1;i<=aulas;i++){
    tabela.innerHTML += `
      <tr>
        <td>Aula ${i}</td>
        <td><input></td>
      </tr>
    `;
  }
}

function salvarHorario(){
  const dados = [];
  document.querySelectorAll("table input").forEach(i=>dados.push(i.value));
  localStorage.setItem("horario", JSON.stringify(dados));
  alert("Horário salvo!");
}

/* PROVAS */
function addProva(){
  const materia = document.getElementById("materiaProva").value;
  const data = document.getElementById("dataProva").value;

  if(!materia || !data) return alert("Preencha tudo!");

  provas.push({materia,data});
  salvarDados();
  renderProvas();
}

function renderProvas(){
  const lista = document.getElementById("listaProvas");
  lista.innerHTML="";

  provas.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${p.materia} - ${p.data}
      <button class="excluir" onclick="removerProva(${i})">Excluir</button>
    `;
    lista.appendChild(div);
  });
}

function removerProva(i){
  provas.splice(i,1);
  salvarDados();
  renderProvas();
}

/* ALERTA */
function verificarProvas(){
  const hoje = new Date().toISOString().split("T")[0];
  provas.forEach(p=>{
    if(p.data === hoje){
      alert("⚠️ Prova HOJE de " + p.materia);
    }
  });
}

/* INICIAR */
carregarDados();
verificarProvas();
abrir("materias");
</script>

</body>
</html>
