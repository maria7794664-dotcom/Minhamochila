<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Profissional</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
}
header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}
nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}
.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}
.card:hover {
  transform: translateY(-2px);
}
.categoria {
  background: #95d5b2;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}
.categoria-conteudo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: 0.4s;
}
.categoria-conteudo.ativo {
  max-height: 2000px;
  opacity: 1;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
}
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #95d5b2;
  cursor: pointer;
}
button.excluir { background: #f28b82; }
.lista-item {
  display: flex;
  justify-content: space-between;
  background: #e6f4ea;
  padding: 5px;
  margin-bottom: 5px;
  border-radius: 6px;
}
.concluida { text-decoration: line-through; opacity: 0.6; }
.hidden { display: none; }
</style>

</head>
<body>

<header>Mochila Escolar</header>

<nav>
  <button onclick="abrir('materias')">Matérias</button>
  <button onclick="abrir('horario')">Horário</button>
  <button onclick="abrir('provas')">Provas</button>
  <button onclick="abrir('info')">Informações</button>
</nav>

<div class="container">

<div id="materias">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <select id="tipoMateria">
      <option>Exatas</option>
      <option>Humanas</option>
      <option>Informática</option>
    </select>
    <button onclick="addMateria()">Adicionar</button>
  </div>
  <div id="listaMaterias"></div>
</div>

</div>

<script>

// --------------------
// 🔥 STORAGE
function salvarDados(){
  localStorage.setItem('materias', JSON.stringify(materias));
}

function carregarDados(){
  materias = JSON.parse(localStorage.getItem('materias')) || [];
}

// --------------------
let materias = [];

function abrir(aba){
  document.getElementById('materias').classList.remove('hidden');
}

// --------------------
// MATÉRIAS
function addMateria(){
  const nome = document.getElementById('nomeMateria').value.trim();
  const tipo = document.getElementById('tipoMateria').value;

  if(!nome) return alert('Digite o nome');

  materias.push({nome,tipo,conteudos:[],tarefas:[]});

  salvarDados(); // 🔥 salva
  renderMaterias();

  document.getElementById('nomeMateria').value='';
}

function renderMaterias(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML='';

  materias.forEach((m,i)=>{
    const card = document.createElement('div');
    card.className='card';

    card.innerHTML = `
      <h3>${m.nome} <button class="excluir" onclick="delMateria(${i})">X</button></h3>
      <input placeholder="Novo conteúdo" onkeydown="if(event.key==='Enter'){addConteudo(${i},this.value);this.value=''}">
      <div id="conteudos-${i}"></div>
    `;

    lista.appendChild(card);

    const div = card.querySelector('#conteudos-'+i);
    m.conteudos.forEach((c,ci)=>{
      div.innerHTML += `
        <div class="lista-item">
          ${c}
          <button onclick="delConteudo(${i},${ci})">X</button>
        </div>
      `;
    });
  });
}

function delMateria(i){
  materias.splice(i,1);
  salvarDados();
  renderMaterias();
}

function addConteudo(i,v){
  if(!v) return;
  materias[i].conteudos.push(v);
  salvarDados();
  renderMaterias();
}

function delConteudo(i,ci){
  materias[i].conteudos.splice(ci,1);
  salvarDados();
  renderMaterias();
}

// --------------------
// INICIAL
carregarDados();
renderMaterias();

</script>

</body>
</html>
