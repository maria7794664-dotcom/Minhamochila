<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Profissional</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
  transition: 0.3s;
}

/* DARK MODE */
.dark {
  background: #1b4332;
  color: #d8f3dc;
}
.dark .card { background: #2d6a4f; }
.dark header { background: #081c15; }
.dark nav { background: #1b4332; }

header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  position: relative;
}

/* botão dark */
.dark-btn {
  position: absolute;
  right: 15px;
  top: 10px;
}

nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}

.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}

.card:hover {
  transform: translateY(-2px);
}

.categoria {
  background: #95d5b2;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.categoria-conteudo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: 0.4s;
}

.categoria-conteudo.ativo {
  max-height: 2000px;
  opacity: 1;
}

/* CORREÇÃO DO BUG */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #95d5b2;
  margin-top: 5px;
}

button.excluir {
  background: #f28b82;
}

.lista-item {
  display: flex;
  justify-content: space-between;
  background: #e6f4ea;
  padding: 5px 10px;
  margin-bottom: 5px;
  border-radius: 6px;
}

.concluida {
  text-decoration: line-through;
  opacity: 0.6;
}

.hidden { display: none; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  Mochila Escolar
  <button class="dark-btn" onclick="toggleDark()">🌙</button>
</header>

<nav>
  <button onclick="abrir('materias')">Matérias</button>
  <button onclick="abrir('horario')">Horário</button>
  <button onclick="abrir('provas')">Provas</button>
  <button onclick="abrir('info')">Informações</button>
</nav>

<div class="container">

<div id="materias" class="hidden">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <select id="tipoMateria">
      <option>Exatas</option>
      <option>Humanas</option>
      <option>Informática</option>
    </select>
    <button onclick="addMateria()">Adicionar</button>
    <input id="pesquisa" placeholder="Pesquisar..." oninput="renderMaterias()">
  </div>
  <div id="listaMaterias"></div>
</div>

<div id="horario" class="hidden">
  <div class="card">
    <h3>Matutino (5 aulas)</h3>
    <table id="matutino"></table>

    <h3>Vespertino (4 aulas)</h3>
    <table id="vespertino"></table>

    <button onclick="salvarHorario()">Salvar Horário</button>
  </div>
</div>

<div id="provas" class="hidden">
  <div class="card">
    <input id="materiaProva" placeholder="Matéria">
    <input id="dataProva" type="date">
    <input id="conteudoProva" placeholder="Conteúdo da prova">
    <button onclick="addProva()">Adicionar Prova</button>
  </div>
  <div id="listaProvas"></div>
</div>

<div id="info" class="hidden">
  <div class="card">
    <input id="escola" placeholder="Escola">
    <input id="turma" placeholder="Turma">
    <input id="turno" placeholder="Turno">
    <input id="aluno" placeholder="Nome do aluno">
    <button onclick="salvarInfo()">Salvar Informações</button>
    <div id="mostrarInfo"></div>
  </div>
</div>

</div>

<script>
let materias = [];
let provas = [];

/* SALVAR / CARREGAR */
function salvarDados(){
  localStorage.setItem("materias", JSON.stringify(materias));
  localStorage.setItem("provas", JSON.stringify(provas));
}

function carregarDados(){
  materias = JSON.parse(localStorage.getItem("materias")) || [];
  provas = JSON.parse(localStorage.getItem("provas")) || [];
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* NAVEGAÇÃO */
function abrir(aba){
  ['materias','horario','provas','info'].forEach(a=>document.getElementById(a).classList.add('hidden'));
  document.getElementById(aba).classList.remove('hidden');
  if(aba==='horario'){ gerarTabela('matutino',5); gerarTabela('vespertino',4); }
}

/* MATÉRIAS */
function addMateria(){
  const nome = nomeMateria.value.trim();
  const tipo = tipoMateria.value;
  if(!nome) return alert('Digite o nome da matéria');

  materias.push({nome,tipo,conteudos:[],tarefas:[],aberta:false});
  nomeMateria.value='';
  salvarDados();
  renderMaterias();
}

function renderMaterias(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML='';
  const pesquisa = document.getElementById('pesquisa').value.toLowerCase();

  ['Exatas','Humanas','Informática'].forEach(tipo=>{
    const grupo = materias.filter(m=>m.tipo===tipo && m.nome.toLowerCase().includes(pesquisa));
    if(!grupo.length) return;

    const cat = document.createElement('div');
    cat.className='categoria';
    cat.innerHTML = tipo;

    const conteudo = document.createElement('div');
    conteudo.className='categoria-conteudo';

    cat.onclick = ()=>conteudo.classList.toggle('ativo');

    lista.appendChild(cat);
    lista.appendChild(conteudo);

    grupo.forEach((m,i)=>{
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`<h4>${m.nome}</h4>`;
      conteudo.appendChild(card);
    });
  });
}

/* PROVAS */
function addProva(){
  const materia = materiaProva.value;
  const data = dataProva.value;

  if(!materia || !data) return alert("Preencha tudo!");

  provas.push({materia,data});
  salvarDados();

  alert("Prova adicionada!");
}

/* ALERTA */
function verificarProvas(){
  const hoje = new Date().toISOString().split('T')[0];

  provas.forEach(p=>{
    if(p.data === hoje){
      alert("⚠️ Prova HOJE de " + p.materia);
    }
  });
}

/* INICIAR */
carregarDados();
verificarProvas();
abrir('materias');
renderMaterias();
</script>

</body>
</html>
