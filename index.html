

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Profissional</title>
<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
}
header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}
nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}
.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}
.card:hover {
  transform: translateY(-2px);
}
.categoria {
  background: #95d5b2;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.categoria-conteudo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.4s ease;
}
.categoria-conteudo.ativo {
  max-height: 2000px;
  opacity: 1;
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #95d5b2;
  margin-top: 5px;
}
button.excluir {
  background: #f28b82;
}
.lista-item {
  display: flex;
  justify-content: space-between;
  background: #e6f4ea;
  padding: 5px 10px;
  margin-bottom: 5px;
  border-radius: 6px;
}
.concluida {
  text-decoration: line-through;
  opacity: 0.6;
}
.hidden { display: none; }
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
}
td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}
</style>
</head>
<body>

<header>🎒 Mochila Escolar Profissional</header>

<nav>
  <button onclick="abrir('materias')">Matérias</button>
  <button onclick="abrir('horario')">Horário</button>
  <button onclick="abrir('provas')">Provas</button>
  <button onclick="abrir('info')">Informações</button>
</nav>

<div class="container">

<!-- MATÉRIAS -->
<div id="materias" class="hidden">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <select id="tipoMateria">
      <option>Exatas</option>
      <option>Humanas</option>
      <option>Informática</option>
    </select>
    <button onclick="addMateria()">Adicionar</button>
    <input id="pesquisa" placeholder="Pesquisar..." oninput="renderMaterias()">
  </div>
  <div id="listaMaterias"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="hidden">
  <div class="card">
    <h3>Matutino (5 aulas)</h3>
    <table id="matutino"></table>

    <h3>Vespertino (4 aulas)</h3>
    <table id="vespertino"></table>

    <button onclick="salvarHorario()">Salvar Horário</button>
  </div>
</div>

<!-- PROVAS -->
<div id="provas" class="hidden">
  <div class="card">
    <input id="materiaProva" placeholder="Matéria">
    <input id="dataProva" type="date">
    <input id="conteudoProva" placeholder="Conteúdo da prova">
    <button onclick="addProva()">Adicionar Prova</button>
  </div>
  <div id="listaProvas"></div>
</div>

<!-- INFORMAÇÕES ESCOLARES -->
<div id="info" class="hidden">
  <div class="card">
    <input id="escola" placeholder="Escola">
    <input id="turma" placeholder="Turma">
    <input id="turno" placeholder="Turno">
    <input id="aluno" placeholder="Nome do aluno">
    <button onclick="salvarInfo()">Salvar Informações</button>
    <div id="mostrarInfo"></div>
  </div>
</div>

</div>

<script>
let materias = [];
let provas = [];
let info = {};
let horario = {};

function abrir(aba){
  ['materias','horario','provas','info'].forEach(a=>document.getElementById(a).classList.add('hidden'));
  document.getElementById(aba).classList.remove('hidden');
  if(aba==='horario'){ gerarTabela('matutino',5); gerarTabela('vespertino',4); }
}

// --------------------
// MATÉRIAS
function addMateria(){
  const nome = document.getElementById('nomeMateria').value.trim();
  const tipo = document.getElementById('tipoMateria').value;
  if(!nome) return alert('Digite o nome da matéria');
  materias.push({nome,tipo,conteudos:[],tarefas:[],aberta:false});
  document.getElementById('nomeMateria').value='';
  renderMaterias();
}

function renderMaterias(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML='';
  const pesquisa = document.getElementById('pesquisa').value.toLowerCase();

  ['Exatas','Humanas','Informática'].forEach(tipo=>{
    const grupo = materias.filter(m=>m.tipo===tipo && m.nome.toLowerCase().includes(pesquisa));
    if(grupo.length===0) return;

    const cat = document.createElement('div');
    cat.className='categoria';
    const spanTipo = document.createElement('span');
    spanTipo.textContent = tipo;
    const btnToggle = document.createElement('button');
    btnToggle.textContent = 'Abrir/Fechar';
    btnToggle.style.background='#74c69d';

    const divConteudo = document.createElement('div');
    divConteudo.className='categoria-conteudo';
    if(grupo.some(g=>g.aberta)) divConteudo.classList.add('ativo');

    btnToggle.onclick = () => {
      divConteudo.classList.toggle('ativo');
      grupo.forEach(g=>g.aberta = divConteudo.classList.contains('ativo'));
    }

    cat.appendChild(spanTipo);
    cat.appendChild(btnToggle);
    lista.appendChild(cat);
    lista.appendChild(divConteudo);

    grupo.forEach((m,mi)=>{
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML=`
        <h4>${m.nome} <button class="excluir" onclick="delMateria(${mi})">Excluir</button></h4>
        <h5>Conteúdos</h5>
        <div id="conteudos-${mi}"></div>
        <input placeholder="Novo conteúdo" data-indice="${mi}">
        <h5>Tarefas</h5>
        <div id="tarefas-${mi}"></div>
        <input placeholder="Nova tarefa" data-indice="${mi}">
      `;
      divConteudo.appendChild(card);

      // render conteúdos
      const divC = card.querySelector('#conteudos-'+mi);
      m.conteudos.forEach((c,ci)=>{
        const d=document.createElement('div');
        d.className='lista-item';
        d.innerHTML=`<span>${c}</span><button class="excluir" onclick="delConteudo(${mi},${ci})">X</button>`;
        divC.appendChild(d);
      });

      // render tarefas
      const divT = card.querySelector('#tarefas-'+mi);
      m.tarefas.forEach((t,ti)=>{
        const d=document.createElement('div');
        d.className='lista-item';
        d.innerHTML=`<div><input type="checkbox" ${t.concluida?"checked":""} onchange="toggleTarefa(${mi},${ti})"><span class="${t.concluida?"concluida":""}">${t.texto}</span></div><button class="excluir" onclick="delTarefa(${mi},${ti})">X</button>`;
        divT.appendChild(d);
      });

      // Enter adiciona conteúdo
      const inputConteudo = card.querySelectorAll('input')[0];
      inputConteudo.addEventListener('keydown',e=>{
        if(e.key==='Enter'){ addConteudo(mi,inputConteudo.value); inputConteudo.value=''; e.preventDefault(); }
      });
      const inputTarefa = card.querySelectorAll('input')[1];
      inputTarefa.addEventListener('keydown',e=>{
        if(e.key==='Enter'){ addTarefa(mi,inputTarefa.value); inputTarefa.value=''; e.preventDefault(); }
      });
    });
  });
}

// --------------------
// Funções de Conteúdo/Tarefa/Excluir
function delMateria(i){ materias.splice(i,1); renderMaterias(); }
function addConteudo(i,v){ if(!v) return; materias[i].conteudos.push(v); renderMaterias(); }
function delConteudo(i,ci){ materias[i].conteudos.splice(ci,1); renderMaterias(); }
function addTarefa(i,v){ if(!v) return; materias[i].tarefas.push({texto:v,concluida:false}); renderMaterias(); }
function delTarefa(i,ti){ materias[i].tarefas.splice(ti,1); renderMaterias(); }
function toggleTarefa(i,ti){ materias[i].tarefas[ti].concluida = !materias[i].tarefas[ti].concluida; renderMaterias(); }

// --------------------
// Horário
function gerarTabela(id,linhas){
  const dias=['Seg','Ter','Qua','Qui','Sex'];
  let html='<tr><th>Aula</th>'; dias.forEach(d=>html+=`<th>${d}</th>`); html+='</tr>';
  for(let i=1;i<=linhas;i++){ html+=`<tr><td>${i}</td>`; dias.forEach(d=> html+=`<td contenteditable id="${id}-${i}-${d}"></td>`); html+='</tr>'; }
  document.getElementById(id).innerHTML=html;
}
function salvarHorario(){ alert('Horário salvo!'); }

// --------------------
// Provas
function addProva(){ alert('Prova adicionada!'); }

// --------------------
// Informações escolares
function salvarInfo(){ alert('Informações salvas!'); }

// Inicial
abrir('materias');
renderMaterias();
</script>

</body>

  </a>
</div>

</div>
</html>
