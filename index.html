<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
}
header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}
nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}
.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}
.card:hover {
  transform: translateY(-2px);
}
.categoria {
  background: #95d5b2;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.categoria-conteudo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.4s ease;
}
.categoria-conteudo.ativo {
  max-height: 2000px;
  opacity: 1;
}

/* ✅ AQUI FOI A CORREÇÃO */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #95d5b2;
  margin-top: 5px;
}
