<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
  transition: 0.3s;
}

.dark {
  background: #1e1e1e;
  color: #eee;
}

header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.dark header { background: #2d6a4f; }

nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}

.dark nav { background: #344e41; }

.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}

.dark .card { background: #2b2b2b; }

.card:hover { transform: translateY(-2px); }

.categoria {
  background: #95d5b2;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.categoria-conteudo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: 0.4s;
}

.categoria-conteudo.ativo {
  max-height: 2000px;
  opacity: 1;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #95d5b2;
  margin-top: 5px;
}

button.excluir { background: #f28b82; }

.lista-item {
  display: flex;
  justify-content: space-between;
  background: #e6f4ea;
  padding: 5px;
  margin-bottom: 5px;
  border-radius: 6px;
}

.concluida {
  text-decoration: line-through;
  opacity: 0.6;
}

.hidden { display: none; }

/* MOBILE */
@media (max-width: 600px) {
  nav { flex-direction: column; }
  .categoria-conteudo { grid-template-columns: 1fr; }
}

/* LINK FINAL */
.link-final {
  text-align: center;
  margin: 20px;
}
</style>
</head>

<body>

<header>
 Mochila Escolar  <br>
<button onclick="toggleTema()">🌙 Tema</button>
</header>

<nav>
  <button onclick="abrir('materias')">📚 Matérias</button>
  <button onclick="abrir('horario')">⏰ Horário</button>
  <button onclick="abrir('provas')">📝 Provas</button>
  <button onclick="abrir('info')">🏫 Info</button>
</nav>

<div class="container">

<div id="materias" class="hidden">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <select id="tipoMateria">
      <option>Exatas</option>
      <option>Humanas</option>
      <option>Informática</option>
    </select>
    <button onclick="addMateria()">Adicionar</button>
    <input id="pesquisa" placeholder="Pesquisar..." oninput="renderMaterias()">
  </div>
  <div id="listaMaterias"></div>
</div>

<div id="horario" class="hidden">
  <div class="card">
    <h3>Matutino</h3>
    <table id="matutino"></table>
    <h3>Vespertino</h3>
    <table id="vespertino"></table>
  </div>
</div>

<div id="provas" class="hidden">
  <div class="card">
    <input placeholder="Matéria">
    <input type="date">
    <button onclick="alert('Prova adicionada!')">Adicionar</button>
  </div>
</div>

<div id="info" class="hidden">
  <div class="card">
    <input placeholder="Escola">
    <input placeholder="Aluno">
    <button onclick="alert('Salvo!')">Salvar</button>
  </div>
</div>

</div>

<div class="link-final">
  <a href="resumoSO.html">
    <button>💻 Sistemas Operacionais</button>
  </a>
</div>

<script>
let materias = [];

// SALVAR
function salvar(){
  localStorage.setItem('materias', JSON.stringify(materias));
}

// CARREGAR
function carregar(){
  const dados = localStorage.getItem('materias');
  if(dados) materias = JSON.parse(dados);

  if(localStorage.getItem('tema') === 'true'){
    document.body.classList.add('dark');
  }
}

// TEMA
function toggleTema(){
  document.body.classList.toggle('dark');
  localStorage.setItem('tema', document.body.classList.contains('dark'));
}

// ABAS
function abrir(aba){
  ['materias','horario','provas','info'].forEach(a=>document.getElementById(a).classList.add('hidden'));
  document.getElementById(aba).classList.remove('hidden');
}

// MATÉRIAS
function addMateria(){
  const nome = document.getElementById('nomeMateria').value;
  const tipo = document.getElementById('tipoMateria').value;

  if(!nome) return alert("Digite algo");

  materias.push({nome,tipo,conteudos:[],tarefas:[]});
  document.getElementById('nomeMateria').value='';
  salvar();
  renderMaterias();
}

function delMateria(i){
  if(confirm("Excluir?")){
    materias.splice(i,1);
    salvar();
    renderMaterias();
  }
}

function renderMaterias(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML='';

  materias.forEach((m,i)=>{
    lista.innerHTML += `
      <div class="card">
        <b>${m.nome}</b>
        <button onclick="delMateria(${i})">Excluir</button>
      </div>
    `;
  });
}

// INIT
carregar();
abrir('materias');
renderMaterias();
</script>

</body>
</html>
