<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Pro</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Arial;
  background: #e6f4ea;
  color: #2a3a2b;
  transition: 0.3s;
}

.dark {
  background: #1e1e1e;
  color: #eee;
}

header {
  background: #b7e4c7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.dark header {
  background: #2d6a4f;
}

nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  background: #d8f3dc;
  padding: 10px;
}

.dark nav {
  background: #344e41;
}

.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: 0.3s;
}

.dark .card {
  background: #2b2b2b;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #95d5b2;
  margin-top: 5px;
}

.hidden { display: none; }

@media (max-width: 600px) {
  nav { flex-direction: column; }
}
</style>
</head>

<body>

<header>
  🎒 Mochila Escolar PRO
  <br>
  <button onclick="toggleTema()">🌙 Alternar Tema</button>
</header>

<nav>
  <button onclick="abrir('materias')">📚 Matérias</button>
  <button onclick="abrir('horario')">⏰ Horário</button>
  <button onclick="abrir('provas')">📝 Provas</button>
  <button onclick="abrir('info')">🏫 Info</button>
</nav>

<div class="container">

<div id="materias">
  <div class="card">
    <input id="nomeMateria" placeholder="Nova matéria">
    <button onclick="addMateria()">Adicionar</button>
  </div>
  <div id="listaMaterias"></div>
</div>

</div>

<div style="text-align:center; margin:20px;">
  <a href="resumoSO.html">
    <button>💻 Sistemas Operacionais</button>
  </a>
</div>

<script>
let materias = [];

// ---------------- SALVAR DADOS
function salvar(){
  localStorage.setItem('materias', JSON.stringify(materias));
  localStorage.setItem('tema', document.body.classList.contains('dark'));
}

function carregar(){
  const m = localStorage.getItem('materias');
  if(m) materias = JSON.parse(m);

  const tema = localStorage.getItem('tema');
  if(tema === 'true') document.body.classList.add('dark');
}

// ---------------- MATÉRIAS
function addMateria(){
  const nome = document.getElementById('nomeMateria').value;
  if(!nome) return alert("Digite algo");

  materias.push(nome);
  document.getElementById('nomeMateria').value='';
  salvar();
  render();
}

function remover(i){
  if(confirm("Excluir?")){
    materias.splice(i,1);
    salvar();
    render();
  }
}

function render(){
  const lista = document.getElementById('listaMaterias');
  lista.innerHTML = '';

  if(materias.length === 0){
    lista.innerHTML = "<p>Nenhuma matéria ainda 😢</p>";
    return;
  }

  materias.forEach((m,i)=>{
    lista.innerHTML += `
      <div class="card">
        ${m}
        <button onclick="remover(${i})">Excluir</button>
      </div>
    `;
  });
}

// ---------------- TEMA
function toggleTema(){
  document.body.classList.toggle('dark');
  salvar();
}

// INIT
carregar();
render();
</script>

</body>
</html>
